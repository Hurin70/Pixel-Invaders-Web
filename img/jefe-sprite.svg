  <!-- Escudo frontal -->
  <path d="M45 25 L75 15 L105 25 L105 50 L75 65 L45 50 Z" fill="#ffcc00" stroke="#cc9900" stroke-width="2"/>
  
  <!-- Ojos -->
  <circle cx="55" cy="35" r="8" fill="#00ffff" stroke="#009999" stroke-width="1.5"/>
  <circle cx="95" cy="35" r="8" fill="#00ffff" stroke="#009999" stroke-width="1.5"/>
  <circle cx="55" cy="35" r="3" fill="#000000"/>
  <circle cx="95" cy="35" r="3" fill="#000000"/>
  
  <!-- Boca/ranura de arma -->
  <rect x="65" y="55" width="20" height="5" fill="#000000" stroke="#990000" stroke-width="1"/>
  
  <!-- Cañones laterales -->
  <circle cx="20" cy="45" r="10" fill="#cc0000" stroke="#990000" stroke-width="2"/>
  <circle cx="130" cy="45" r="10" fill="#cc0000" stroke="#990000" stroke-width="2"/>
  
  <!-- Decoraciones -->
  <path d="M50 70 L60 80 L70 70" fill="none" stroke="#990000" stroke-width="2"/>
  <path d="M80 70 L90 80 L100 70" fill="none" stroke="#990000" stroke-width="2"/>
  
  <!-- Luces de energía -->
  <circle cx="35" cy="25" r="4" fill="#ffff00"/>
  <circle cx="115" cy="25" r="4" fill="#ffff00"/>
  <circle cx="75" cy="25" r="4" fill="#ffff00"/>
</svg>
