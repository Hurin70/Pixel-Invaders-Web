<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
    <!-- Cuerpo principal -->
    <polygon points="25,5 40,40 25,48 10,40" fill="#7ecb7e" stroke="#2e7d32" stroke-width="1"/>
    <!-- Cabina circular -->
    <circle cx="25" cy="38" r="6" fill="#b2ffb2" stroke="#388e3c" stroke-width="1"/>
    <!-- Detalles centrales -->
    <rect x="22" y="15" width="6" height="15" fill="#388e3c" stroke="#1b5e20" stroke-width="0.5"/>
    <rect x="21" y="18" width="8" height="2" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.3"/>
    <rect x="21" y="22" width="8" height="2" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.3"/>
    <!-- Alas laterales -->
    <polygon points="10,25 5,35 15,32" fill="#4caf50" stroke="#2e7d32" stroke-width="0.7"/>
    <polygon points="40,25 45,35 35,32" fill="#4caf50" stroke="#2e7d32" stroke-width="0.7"/>
    <!-- Propulsores laterales -->
    <polygon points="8,40 12,45 5,48" fill="#ff4400" stroke="#cc3300" stroke-width="0.7"/>
    <polygon points="42,40 38,45 45,48" fill="#ff4400" stroke="#cc3300" stroke-width="0.7"/>
    <!-- Propulsor central -->
