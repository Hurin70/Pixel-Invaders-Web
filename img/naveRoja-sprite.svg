<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <g transform="scale(1,-1) translate(0,-50)">
    <!-- Cuerpo principal -->
    <polygon points="25,5 40,40 25,48 10,40" fill="#ff4d4d" stroke="#a60000" stroke-width="1.5"/>
    <!-- Cabina circular -->
    <circle cx="25" cy="38" r="6" fill="#ffb3b3" stroke="#a60000" stroke-width="1"/>
    <!-- Detalles centrales -->
    <rect x="22" y="15" width="6" height="15" fill="#b30000" stroke="#a60000" stroke-width="0.5"/>
    <rect x="21" y="18" width="8" height="2" fill="#ff6666" stroke="#a60000" stroke-width="0.3"/>
    <rect x="21" y="22" width="8" height="2" fill="#ff6666" stroke="#a60000" stroke-width="0.3"/>
    <!-- Alas laterales -->
    <polygon points="10,25 5,35 15,32" fill="#ff3333" stroke="#a60000" stroke-width="0.7"/>
    <polygon points="40,25 45,35 35,32" fill="#ff3333" stroke="#a60000" stroke-width="0.7"/>
    <!-- Propulsores laterales -->
    <polygon points="8,40 12,45 5,48" fill="#ff9900" stroke="#cc3300" stroke-width="0.7"/>
    <polygon points="42,40 38,45 45,48" fill="#ff9900" stroke="#cc3300" stroke-width="0.7"/>
    <!-- Propulsor central -->
    <polygon points="23,48 25,50 27,48" fill="#ff6600" stroke="#a60000" stroke-width="0.7"/>
  </g>
</svg>