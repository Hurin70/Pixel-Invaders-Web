<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <g transform="scale(1,-1) translate(0,-50)">
    <!-- Cuerpo principal ancho y robusto -->
    <polygon points="25,5 40,35 35,48 15,48 10,35" fill="#ffe066" stroke="#bfa600" stroke-width="1.5"/>
    <!-- Cabina circular protegida -->
    <ellipse cx="25" cy="38" rx="7" ry="5" fill="#fff9b3" stroke="#bfa600" stroke-width="1"/>
    <!-- Escudos laterales -->
    <rect x="5" y="25" width="8" height="18" rx="3" fill="#ffd700" stroke="#bfa600" stroke-width="1"/>
    <rect x="37" y="25" width="8" height="18" rx="3" fill="#ffd700" stroke="#bfa600" stroke-width="1"/>
    <!-- Detalles centrales -->
    <rect x="22" y="15" width="6" height="15" fill="#bfa600" stroke="#bfa600" stroke-width="0.5"/>
    <rect x="21" y="18" width="8" height="2" fill="#ffe066" stroke="#bfa600" stroke-width="0.3"/>
    <rect x="21" y="22" width="8" height="2" fill="#ffe066" stroke="#bfa600" stroke-width="0.3"/>
    <!-- Propulsores laterales -->
    <polygon points="13,48 10,50 18,50" fill="#ff9900" stroke="#cc3300" stroke-width="0.7"/>
    <polygon points="37,48 32,50 40,50" fill="#ff9900" stroke="#cc3300" stroke-width="0.7"/>
    <!-- Propulsor central -->
    <polygon points="23,48 25,52 27,48" fill="#ff6600" stroke="#bfa600" stroke-width="0.7"/>
  </g>
</svg>