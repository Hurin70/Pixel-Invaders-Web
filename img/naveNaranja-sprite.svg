  <!-- Cuerpo de la llama -->
  <path d="M25 48 Q20 40 23 32 Q15 35 18 25 Q10 30 15 15 Q12 10 25 2 Q38 10 35 15 Q40 30 32 25 Q35 35 27 32 Q30 40 25 48 Z" fill="url(#fuego)" stroke="#b35c00" stroke-width="1.5"/>
  <!-- Letra M blanca con sombra -->
  <text x="25" y="32" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="22" font-weight="bold" fill="#fff" filter="url(#sombraM)">M</text>
