import sys
import asyncio
import platform
import json
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#7f7f7f"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "version.web"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/version.web
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("version.web.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        import io
        chunks = []
        for i in range(1, 5):
            platform.window.currentLoadingPart = i
            async with platform.fopen(f"version.web.00{i}.data", "rb") as part:
                chunks.append(part.read())
        platform.window.currentLoadingPart = 5
        fileobj = io.BytesIO(b"".join(chunks))
        tar = tarfile.open(fileobj=fileobj, mode="r:gz")
        tar.extractall(path=appdir.as_posix(), filter='tar')
        tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # TODO: test for window.webkitAudioContext and block aio loop until gesture if accessing media manager play
    # before a gesture is recorded ( touch or click )

    # test/wait user media interaction
    if not platform.window.MM.UME:

        # now that apk is mounted we have access to font cache
        # but we need to fill __file__ that is not yet set
        __import__(__name__).__file__ = main

        # now make a prompt
        msg  = "Ready to start ! Please click/touch page"
        platform.window.infobox.innerText = msg
        print("\n"*4, f"    * Waiting for media user engagement. {msg} *" , "\n"*4)

        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        platform.window.infobox.innerText = f"installing {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

    function info_inline(data){
        document.getElementById("info").innerHTML = data
    }

    function info_online(url) {
        // display info about current APK
        fetch( url /*, options */)
            .then((response) => response.text())
            .then((html) => {
                info_inline(html);
        })
        .catch((error) => {
            console.warn(error);
        });
    }

    function frame_online(url) {
        window.frames["iframe"].location = url;
    }

    // ── STAR FIELD ──
    (function() {
        const container = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            const o = (Math.random() * 0.5 + 0.2).toFixed(2);
            const d = (Math.random() * 3 + 1.5).toFixed(1) + 's';
            s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*60}%;--o:${o};--d:${d};animation-delay:${(Math.random()*3).toFixed(1)}s;`;
            container.appendChild(s);
        }
    })();

    const PART_MSGS = [
        'CARGANDO NÚCLEO DE PROPULSIÓN',
        'ENSAMBLANDO ESCUDOS DEFLECTORES',
        'CALIBRANDO SISTEMAS DE ARMAS',
        'ACTIVANDO INTELIGENCIA DE VUELO',
        'NAVE LISTA PARA EL DESPEGUE'
    ];

    let loaderDone = false;

    setInterval(() => {
        const progressEl = document.getElementById('progress');
        if (!progressEl) return;

        let value = parseFloat(progressEl.value) || 0;
        let max   = parseFloat(progressEl.max)   || 100;
        let partPercentage = Math.min((value / max) * 100, 100);
        let currentPart = window.currentLoadingPart || 1;
        let globalPct = 0;

        if (currentPart >= 1 && currentPart <= 4) {
            globalPct = Math.round(((currentPart - 1) * 25) + (partPercentage * 0.25));
        } else {
            globalPct = 100;
        }
        globalPct = Math.min(globalPct, 100);

        const fill = document.getElementById('progress-bar-fill');
        const pct  = document.getElementById('progress-pct');
        const msg  = document.getElementById('progress-msg');
        const part = document.getElementById('progress-part-label');

        if (fill) fill.style.width = globalPct + '%';
        if (pct)  pct.textContent = globalPct + '%';
        if (part && currentPart <= 4) part.textContent = `PARTE ${currentPart} / 4`;
        if (msg) {
            const idx = Math.min((currentPart || 1) - 1, PART_MSGS.length - 1);
            msg.innerHTML = PART_MSGS[idx] + '<span id="blink-cursor">_</span>';
        }

        if (globalPct >= 100 && !loaderDone) {
            loaderDone = true;
            // Show click-to-start
            const loader = document.getElementById('arcade-loader');
            const clickStart = document.getElementById('click-to-start');
            if (loader) {
                loader.style.transition = 'opacity 0.6s ease';
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    if (clickStart) clickStart.classList.add('visible');
                }, 650);
            }
        }
    }, 50);

    // Hide click-to-start on first interaction
    document.addEventListener('click', function hideStart() {
        const el = document.getElementById('click-to-start');
        if (el) el.style.display = 'none';
        document.removeEventListener('click', hideStart);
    });
    document.addEventListener('keydown', function hideStartKey() {
        const el = document.getElementById('click-to-start');
        if (el) el.style.display = 'none';
        document.removeEventListener('keydown', hideStartKey);
    });

    </script>
